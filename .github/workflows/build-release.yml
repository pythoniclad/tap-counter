name: Build Release AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Set version code from run number
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "Version code set to $VERSION_CODE"

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/tap-counter-upload-key.keystore

      - name: Build release AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease
        env:
          MYAPP_UPLOAD_STORE_FILE: tap-counter-upload-key.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload native debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: native-debug-symbols
          path: android/app/build/intermediates/merged_native_libs/release/**/out/lib
          retention-days: 30
          if-no-files-found: ignore
